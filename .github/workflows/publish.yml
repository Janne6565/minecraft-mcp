name: Publish web image

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/janne6565/blockworks

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "tag=master-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:latest

      - name: Bump image tag in k8s manifests
        run: |
          sed -i "s|image: ${IMAGE}:.*|image: ${IMAGE}:${{ steps.tag.outputs.tag }}|" k8s/deployment.yaml
          if git diff --quiet; then
            echo "No manifest change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: bump image to ${{ steps.tag.outputs.tag }} [skip ci]"
          git push
